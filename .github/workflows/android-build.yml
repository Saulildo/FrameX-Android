name: Android Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        id: build
        shell: bash
        run: |
          set +e
          ./gradlew assembleDebug --no-daemon 2>&1 | tee build-output.log
          Status=${PIPESTATUS[0]}
          echo "status=$Status" >> "$GITHUB_OUTPUT"
          exit "$Status"

      - name: Report build failure
        if: failure() && steps.build.outputs.status != '0'
        shell: bash
        run: |
          {
            echo "### Gradle failure"
            echo '```text'
            sed -n '1,180p' build-output.log
            echo
            echo "--- Last 80 lines ---"
            tail -n 80 build-output.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          Message=$({ sed -n '1,180p' build-output.log; echo; echo "--- Last 80 lines ---"; tail -n 80 build-output.log; } | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
          echo "::error title=Gradle build failed::$Message"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FrameX-build-log
          path: build-output.log
          if-no-files-found: ignore

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FrameX-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
